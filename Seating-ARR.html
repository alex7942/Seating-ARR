<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리배치 추첨</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --base-dark: rgba(44, 62, 80, 1);
            --accent: #e74c3c; 
            --fixed-green: #27ae60;
            --excel-green: #1d6f42;
            --main-grad: linear-gradient(135deg, rgba(44, 62, 80, 1) 0%, rgba(20, 30, 48, 1) 100%);
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--main-grad); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            align-items: center; 
            height: 100vh; overflow: hidden;
            color: white;
        }

        #overlay {
            position: fixed; inset: 0;
            background: var(--main-grad);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .setup-box { background: white; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .setup-title { display: flex; align-items: center; justify-content: center; gap: 12px; color: var(--base-dark); margin-bottom: 2rem; font-size: 1.5rem; }
        .input-group { margin: 1.2rem 0; display: flex; align-items: center; gap: 12px; }
        label { font-weight: bold; width: 85px; text-align: right; font-size: 0.95rem; color: #444; }
        input { flex: 1; padding: 14px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 1rem; outline: none; color: #333; }

        button { cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-family: inherit; }
        .btn-setup { background: var(--base-dark); color: white; width: 100%; height: 55px; font-size: 1.1rem; border-radius: 12px; margin-top: 1.5rem; font-weight: bold; }

        #main-content { 
            display: flex; flex-direction: column; 
            width: 100%; max-width: 1200px;
            height: 100%; padding: 20px; box-sizing: border-box; 
            visibility: hidden; position: relative; 
            align-items: center;
        }
        
        .btn-reset { 
            position: fixed; top: 20px; right: 20px; 
            background: rgba(255, 255, 255, 0.15); color: white; 
            width: 44px; height: 44px; border-radius: 50%; display: none; z-index: 100;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);
        }
        
        .controls { 
            display: flex; justify-content: center; gap: 12px; 
            margin-bottom: 20px; width: 100%; max-width: 600px; 
        }
        .btn-draw { background: var(--accent); color: white; font-size: 1.2rem; font-weight: bold; flex: 2; height: 60px; border-radius: 14px; gap: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .btn-excel { background: var(--excel-green); color: white; font-size: 1rem; font-weight: bold; flex: 1; height: 60px; border-radius: 14px; gap: 8px; display: none; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        #grid-board { 
            display: flex; flex-direction: row; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 15px; flex-grow: 1; width: 100%; 
            overflow-x: auto; padding: 20px 0; 
        }
        
        .seat-column { display: flex; flex-direction: column-reverse; gap: 12px; flex: 1; max-width: 160px; }
        
        .seat { 
            width: 100%; aspect-ratio: 180 / 144; 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; font-weight: 800; 
            font-size: clamp(1.2rem, 4vw, 2.8rem); 
            color: rgba(255, 255, 255, 0.1); 
            box-sizing: border-box; transition: all 0.2s; 
            display: flex; justify-content: center; align-items: center;
        }
        .seat.active { border-color: var(--accent); color: var(--accent); background: white; transform: scale(1.05); z-index: 2; }
        .seat.fixed { border-color: var(--fixed-green); color: var(--fixed-green); background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .blackboard-container { margin-top: 10px; padding-bottom: 20px; width: 100%; display: flex; justify-content: center; }
        .blackboard { 
            width: 90%; max-width: 400px; height: 100px; 
            background: #1a3a16; color: white; gap: 12px; 
            border: 6px solid #5d4037; border-radius: 12px; 
            font-weight: bold; font-size: 1.4rem; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            #grid-board { justify-content: flex-start; padding-left: 20px; }
            .controls { flex-direction: column; align-items: center; }
            .btn-draw, .btn-excel { width: 100%; height: 50px; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="setup-box">
        <h2 class="setup-title"><i data-lucide="settings"></i> 자리배치 설정</h2>
        <div class="input-group"><label>전체 인원:</label><input type="number" id="total-count" value="32"></div>
        <div class="input-group"><label>결번 번호:</label><input type="text" id="exclude-input" placeholder="예: 3, 14"></div>
        <div class="input-group"><label>세로줄 배치:</label><input type="text" id="layout-input" value="5,5,5,6,5,5"></div>
        <button class="btn-setup" onclick="applySettings()">설정 완료 및 시작</button>
    </div>
</div>

<div id="main-content">
    <button class="btn-reset" onclick="location.reload()" title="다시 설정"><i data-lucide="settings"></i></button>
    
    <div class="controls">
        <button class="btn-draw" id="draw-btn" onclick="startAllRoll()">
            <i data-lucide="play" fill="white"></i> 추첨 시작
        </button>
        <button class="btn-excel" id="excel-btn" onclick="exportToCSV()">
            <i data-lucide="download"></i> 엑셀 저장
        </button>
    </div>
    
    <div id="grid-board"></div>
    
    <div class="blackboard-container">
        <div class="blackboard"><i data-lucide="presentation"></i> 교 탁</div>
    </div>
</div>

<script>
    lucide.createIcons();
    let numberPool = [], seatCount = 0, isRolling = false, intervals = [];
    let finalNumbers = []; // 오직 숫자만 담을 배열

    function applySettings() {
        const total = parseInt(document.getElementById('total-count').value);
        const excludeText = document.getElementById('exclude-input').value;
        const layoutText = document.getElementById('layout-input').value;
        const excludes = excludeText.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        
        numberPool = [];
        for (let i = 1; i <= total; i++) if (!excludes.includes(i)) numberPool.push(i);

        const counts = layoutText.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        const board = document.getElementById('grid-board');
        board.innerHTML = ''; seatCount = 0;

        counts.forEach((count) => {
            const colDiv = document.createElement('div');
            colDiv.className = 'seat-column';
            for (let i = 0; i < count; i++) {
                if (seatCount >= numberPool.length) break;
                const seat = document.createElement('div');
                seat.className = 'seat'; seat.id = `seat-${seatCount}`;
                seat.innerText = "?"; colDiv.appendChild(seat); seatCount++;
            }
            board.appendChild(colDiv);
        });

        document.getElementById('overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-content').style.visibility = 'visible';
            document.getElementById('draw-btn').style.display = 'flex';
            document.querySelector('.btn-reset').style.display = 'flex';
        }, 400);
        lucide.createIcons();
    }

    function startAllRoll() {
        if (isRolling) return;
        isRolling = true;
        finalNumbers = []; 
        const btn = document.getElementById('draw-btn');
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="spin"></i>`;
        lucide.createIcons();

        const currentPool = [...numberPool];
        for (let i = 0; i < seatCount; i++) {
            const seat = document.getElementById(`seat-${i}`);
            seat.classList.add('active');
            intervals[i] = setInterval(() => {
                seat.innerText = currentPool[Math.floor(Math.random() * currentPool.length)];
            }, 70);
        }

        let fixedCount = 0;
        const shufflePool = [...numberPool].sort(() => Math.random() - 0.5);
        
        const stopOneByOne = setInterval(() => {
            if (fixedCount >= seatCount) {
                clearInterval(stopOneByOne); isRolling = false;
                btn.innerHTML = `<i data-lucide="party-popper"></i> 완료`;
                document.getElementById('excel-btn').style.display = 'flex';
                lucide.createIcons(); return;
            }
            clearInterval(intervals[fixedCount]);
            const seat = document.getElementById(`seat-${fixedCount}`);
            const resultNum = shufflePool[fixedCount];
            seat.innerText = resultNum;
            
            // 단순하게 숫자만 저장
            finalNumbers.push(resultNum);

            seat.classList.remove('active'); seat.classList.add('fixed');
            fixedCount++;
        }, 300);
    }

    function exportToCSV() {
        if (finalNumbers.length === 0) return;
        
        let csvContent = "\uFEFF"; // 한글 깨짐 방지
        csvContent += "Number\n"; // 요청하신 헤더
        
        finalNumbers.forEach(num => {
            csvContent += `${num}\n`; // 숫자만 한 줄씩
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        const now = new Date();
        const dateStr = `${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}`;
        
        link.setAttribute("href", url);
        link.setAttribute("download", `Result_${dateStr}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
